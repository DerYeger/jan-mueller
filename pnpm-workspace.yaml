minimumReleaseAge: 2880
minimumReleaseAgeExclude:
  - '@yeger/*'
  - 'vue-marmoset-viewer'

trustPolicy: no-downgrade
trustPolicyExclude:
  - astro-mermaid@2.0.1
  - chokidar@4.0.3
  - semver@5.7.2 || 6.3.1
  - ua-parser-js@1.0.41
  - vite@6.4.1

onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - esbuild
  - exifreader
  - sharp
  - unrs-resolver
